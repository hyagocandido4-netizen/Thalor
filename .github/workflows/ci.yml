name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax (compileall)
        run: |
          python -m compileall -q src/natbin

      - name: PowerShell syntax (parse operational scripts)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Legacy patch/migration scripts under scripts/patches are historical
          # artifacts and are not part of the operational runtime.
          $files = Get-ChildItem -Recurse -Filter *.ps1 -Path scripts |
            Where-Object { $_.FullName -notlike '*\scripts\patches\*' }

          $all = @()
          foreach ($f in $files) {
            $tokens = $null
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs -and $errs.Count -gt 0) {
              foreach ($e in $errs) {
                $all += "$($f.FullName): $($e.Message) (line $($e.Extent.StartLineNumber))"
              }
            }
          }

          if ($all.Count -gt 0) {
            $all | ForEach-Object { Write-Host $_ }
            throw 'PowerShell parse errors found in operational scripts.'
          }

      - name: Hidden unicode / bidi guard
        run: |
          python scripts/tools/check_hidden_unicode.py

      - name: Repo selfcheck
        run: |
          python scripts/tools/selfcheck_repo.py

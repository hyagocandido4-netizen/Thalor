name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax (compileall)
        run: |
          python -m compileall -q src/natbin

      - name: PowerShell syntax (parse operational scripts)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $files = Get-ChildItem -Recurse -Filter *.ps1 -Path scripts



          $all = @()
          foreach ($f in $files) {
            $tokens = $null
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs -and $errs.Count -gt 0) {
              foreach ($e in $errs) {
                $all += "$($f.FullName): $($e.Message) (line $($e.Extent.StartLineNumber))"
              }
            }
          }

          if ($all.Count -gt 0) {
            $all | ForEach-Object { Write-Host $_ }
            throw 'PowerShell parse errors found in operational scripts.'
          }

      - name: Hidden unicode / bidi guard
        run: |
          python scripts/tools/check_hidden_unicode.py

      - name: Config v2 smoke
        run: |
          python scripts/tools/config_smoke.py

      - name: Config consumers smoke
        run: |
          python scripts/tools/config_consumers_smoke.py

      - name: Runtime app smoke
        run: |
          python scripts/tools/runtime_app_smoke.py
          python scripts/tools/repo_entrypoints_smoke.py

      - name: Repo selfcheck
        run: |
          python scripts/tools/selfcheck_repo.py

      - name: Regression smoke
        run: |
          python scripts/tools/regression_smoke.py

      - name: Runtime contracts smoke
        run: |
          python scripts/tools/runtime_contract_smoke.py

      - name: Runtime repositories smoke
        run: |
          python scripts/tools/runtime_repos_smoke.py
          python scripts/tools/execution_repo_smoke.py
          python scripts/tools/broker_adapter_contract_smoke.py
          python scripts/tools/execution_reconcile_smoke.py
          python scripts/tools/runtime_execution_integration_smoke.py

      - name: Runtime orchestration smoke
        run: |
          python scripts/tools/runtime_orchestration_smoke.py

      - name: Autos refactor smoke
        run: |
          python scripts/tools/autos_refactor_smoke.py

      - name: Runtime observability smoke
        run: |
          python scripts/tools/runtime_observability_smoke.py

      - name: Runtime scope/perf smoke
        run: |
          python scripts/tools/runtime_scope_smoke.py

      - name: Runtime cycle smoke
        run: |
          python scripts/tools/runtime_cycle_smoke.py

      - name: Runtime daemon smoke
        run: |
          python scripts/tools/runtime_daemon_smoke.py

      - name: Runtime quota smoke
        run: |
          python scripts/tools/runtime_quota_smoke.py

      - name: Failsafe kernel smoke
        run: |
          python scripts/tools/failsafe_smoke.py

      - name: Failsafe integration smoke
        run: |
          python scripts/tools/failsafe_integration_smoke.py

      - name: Runtime daemon failsafe smoke
        run: |
          python scripts/tools/runtime_daemon_failsafe_smoke.py

      - name: Runtime health smoke
        run: |
          python scripts/tools/health_smoke.py

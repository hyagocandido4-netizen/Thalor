version: "2.0"

# Multi-asset demo config for Thalor v2.0.
# Use this file to validate:
#   - partitioned market DB + dataset per scope_tag
#   - partitioned runtime DBs (signals/state) per scope_tag
#   - parallel prepare/candidate when max_parallel_assets > 1
#
# Run:
#   python -m natbin.runtime_app portfolio status --repo-root . --config config/multi_asset.yaml --json
#   python -m natbin.runtime_app portfolio observe --repo-root . --config config/multi_asset.yaml --once --topk 3 --lookback-candles 2000 --json

runtime:
  profile: default
  quota_aware_sleep: true
  legacy_runtime_cleanup_enable: true

broker:
  provider: iqoption
  balance_mode: PRACTICE

data:
  # Defaults (used only when multi_asset.partition_data_paths=false).
  db_path: data/market_otc.sqlite3
  dataset_path: data/dataset_phase2.csv
  lookback_candles: 2000
  max_batch: 1000

decision:
  gate_mode: cp
  meta_model: hgb
  thresh_on: ev
  threshold: 0.02
  tune_dir: runs/tune_mw_topk_20260223_222559
  bounds:
    vol_lo: 0.001960
    vol_hi: 0.006510
    bb_lo: 0.008000
    bb_hi: 0.039000
    atr_lo: 0.000800
    atr_hi: 0.003100
  pacing_enable: true
  fail_closed: true

quota:
  target_trades_per_day: 3.0
  hard_max_trades_per_day: 3
  pacing_morning_cap: 1
  pacing_afternoon_cap: 2
  pacing_morning_until_hhmm: "08:00"
  pacing_afternoon_until_hhmm: "16:00"

autos:
  enabled: true
  summary_fail_closed: true
  legacy_summary_fallback: false
  min_days_used: 3
  min_trades_eval: 10
  volume_enabled: true
  isoblend_enabled: true
  hourthr_enabled: true

observability:
  status_enable: true
  metrics_enable: false
  metrics_bind: 127.0.0.1:9108
  structured_logs_enable: true
  structured_logs_path: runs/logs/runtime_structured.jsonl
  loop_log_enable: true
  loop_log_dir: runs/logs
  loop_log_retention_days: 14
  incidents_enable: true
  decision_snapshots_enable: true

failsafe:
  global_fail_closed: true
  market_context_fail_closed: true
  summary_fail_closed: true
  kill_switch_file: runs/KILL_SWITCH
  kill_switch_env_var: THALOR_KILL_SWITCH
  drain_mode_file: runs/DRAIN_MODE
  drain_mode_env_var: THALOR_DRAIN_MODE
  circuit_breaker_enable: true
  breaker_failures_to_open: 3
  breaker_cooldown_minutes: 15
  breaker_half_open_trials: 1

multi_asset:
  enabled: true
  # Set to 1 to keep sequential; set to 2+ to validate parallel-safe partitioning.
  max_parallel_assets: 2

  # Portfolio selection limits
  portfolio_topk_total: 3
  portfolio_hard_max_positions: 1
  portfolio_hard_max_trades_per_day: null
  max_trades_per_cluster_per_cycle: 1

  # Safe partitioning of per-asset data paths (recommended for parallel runs)
  partition_data_paths: true
  data_db_template: data/market_{scope_tag}.sqlite3
  dataset_path_template: data/datasets/{scope_tag}/dataset.csv

execution:
  enabled: false
  mode: disabled
  provider: fake
  account_mode: PRACTICE
  fail_closed: true
  client_order_prefix: thalor
  stake:
    amount: 2.0
    currency: BRL
  submit:
    grace_sec: 2
    max_latency_ms: 1500
    retry_on_reject: false
    retry_on_timeout: false
  reconcile:
    poll_interval_sec: 5
    history_lookback_sec: 3600
    orphan_lookback_sec: 7200
    not_found_grace_sec: 20
    settle_grace_sec: 30
  limits:
    max_pending_unknown: 1
    max_open_positions: 1
  fake:
    state_path: runs/fake_broker_state.json
    submit_behavior: ack
    settlement: open
    settle_after_sec: 0
    create_order_on_timeout: true
    payout: 0.80
    heartbeat_ok: true

assets:
  # NOTE: adjust assets to the ones you actually trade (and that exist in your broker).
  - asset: EURUSD-OTC
    interval_sec: 300
    timezone: America/Sao_Paulo
    payout_default: 0.80
    topk_k: 3
    weight: 1.0
    cluster_key: fx

  - asset: GBPUSD-OTC
    interval_sec: 300
    timezone: America/Sao_Paulo
    payout_default: 0.80
    topk_k: 3
    weight: 1.0
    cluster_key: fx

runtime_overrides: {}
